<!DOCTYPE html>
<html lang="mn">

<head>

<meta charset="UTF-8">

<title>Админ нэвтрэх</title>


<style>

body{

font-family:Arial;

width:400px;

margin:100px auto;

}


input,button{

width:100%;

padding:12px;

margin:10px 0;

}


button{

cursor:pointer;

}

</style>


</head>


<body>


<h2>
🔐 Админ нэвтрэх
</h2>


<input 
id="password"
type="password"
placeholder="Нууц үг">


<button onclick="login()">

Нэвтрэх

</button>



<script>


function login(){


let password =
document.getElementById("password").value;

console.log(password);


if(password.trim()=="123456"){


localStorage.setItem(
"admin",
"true"
);



window.location.href="/admin/panel";


}

else{


alert("Нууц үг буруу байна");

}



}


</script>


</body>

</html>
